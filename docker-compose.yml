services:
  gitlab-reviewer:
    build: .
    image: gitlab-reviewer:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./config.yml:/app/config.yml
      - ./prompts:/app/prompts:ro
      - reviewer_data:/app/data       # SQLite database
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Ollama — local LLM backend.
  # Remove this service if ollama is already running on the host.
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    # GPU acceleration (AMD ROCm/Vulkan) — uncomment for your hardware:
    # devices:
    #   - /dev/kfd
    #   - /dev/dri
    # environment:
    #   - HSA_OVERRIDE_GFX_VERSION=11.0.0

  # Valkey (Redis-compatible) — optional distributed queue + cache backend.
  # Enable with: docker compose --profile valkey up -d
  valkey:
    image: valkey/valkey:8-alpine
    profiles: [valkey]
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    command: valkey-server --save 60 1 --loglevel warning

  # Kafka (KRaft mode, no ZooKeeper) — optional high-volume event streaming.
  # Enable with: docker compose --profile kafka up -d
  # After start, create topic manually or let auto-creation handle it.
  kafka:
    image: bitnami/kafka:latest
    profiles: [kafka]
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_CFG_NUM_PARTITIONS=3        # 3 partitions for parallel consumers
      - KAFKA_CFG_DEFAULT_REPLICATION_FACTOR=1
      - ALLOW_PLAINTEXT_LISTENER=yes
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  reviewer_data:
  ollama_data:
  valkey_data:
  kafka_data:
