services:
  gitlab-reviewer:
    build: .
    image: gitlab-reviewer:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      # Mount config and prompts so you can edit without rebuilding
      - ./config.yml:/app/config.yml:ro
      - ./prompts:/app/prompts:ro
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Ollama — local LLM backend.
  # Remove this service if ollama is already running on the host.
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    # For GPU acceleration on AMD (ROCm/Vulkan), uncomment:
    # devices:
    #   - /dev/kfd
    #   - /dev/dri
    # environment:
    #   - HSA_OVERRIDE_GFX_VERSION=11.0.0

volumes:
  ollama_data:
