apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gitlab-reviewer.fullname" . }}
  labels:
    {{- include "gitlab-reviewer.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "gitlab-reviewer.labels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "gitlab-reviewer.labels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: gitlab-reviewer
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: {{ include "gitlab-reviewer.fullname" . }}-env
          env:
            - name: GLR_GITLAB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ default (include "gitlab-reviewer.fullname" .) .Values.secrets.existingSecret }}
                  key: gitlab-token
            - name: GLR_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ default (include "gitlab-reviewer.fullname" .) .Values.secrets.existingSecret }}
                  key: webhook-secret
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
