cache:
  backend: memory
  ttl: 3600
  valkey_url: redis://localhost:6379
file_exclude:
- '*.lock'
- package-lock.json
- yarn.lock
- poetry.lock
- Cargo.lock
- vendor/**
- node_modules/**
- '*.min.js'
- '*.min.css'
- '*.generated.*'
- dist/**
- build/**
gitlab:
  auth_type: token
  tls_verify: true
  url: https://gitlab.fgdevelop.tech
max_files_per_review: 50
model:
  context_size: null
  inline_comments: true
  max_tokens: 4096
  name: GLM-4.7-Flash-UD-Q4_K_XL.gguf
  provider_id: glm-local
  temperature: 0.2
notifications:
  enabled: false
  format: generic
  on_error: false
  on_posted: true
  on_skipped: false
prompts:
  system:
  - base
  - security
providers:
- active: true
  api_key: ''
  id: glm-local
  name: GLM-4.7-Flash (local, toolbox)
  type: llamacpp
  url: http://localhost:8080
- active: false
  api_key: ''
  id: openrouter
  name: OpenRouter
  type: openai_compat
  url: https://openrouter.ai/api
queue:
  backend: memory
  kafka_brokers: localhost:9092
  kafka_group_id: glr-reviewers
  kafka_topic: glr.mr.events
  max_concurrent: 3
  max_queue_size: 100
  valkey_url: redis://localhost:6379
review_cooldown_minutes: 2
review_targets:
- author_allowlist: []
  auto_approve: false
  branches:
    pattern: '*'
    protected_only: false
  file_exclude: []
  id: '127'
  max_files_per_review: null
  project_ids: []
  prompts:
    system: []
  review_cooldown_minutes: null
  skip_authors:
  - bot
  - ci-bot
  type: group
server:
  host: 0.0.0.0
  log_level: info
  port: 8000
ui:
  enabled: true
  log_buffer_lines: 1000
